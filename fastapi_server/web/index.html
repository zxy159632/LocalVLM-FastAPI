<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Qwen Mobile Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 860px;
      margin: 24px auto;
      padding: 0 16px 40px;
      color: #222;
      line-height: 1.6;
    }

    /* 新增顶部布局，让标题和下拉框并排 */
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .header-container h1 {
      margin: 0;
    }

    #streamMode {
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #d9d9d9;
      font-size: 14px;
      background-color: white;
      cursor: pointer;
    }

    .desc {
      color: #666;
      margin-bottom: 24px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      background: #fafafa;
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 20px;
    }

    textarea, input, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      margin-top: 10px;
    }

    textarea {
      min-height: 110px;
      padding: 12px;
      border: 1px solid #d9d9d9;
      border-radius: 10px;
      resize: vertical;
    }

    input[type="file"] {
      padding: 8px 0;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .output {
      margin-top: 12px;
      min-height: 100px;
      border: 1px solid #d9d9d9;
      border-radius: 10px;
      padding: 12px;
      background: white;
      white-space: pre-wrap;
    }

    .meta {
      margin-top: 10px;
      color: #666;
      white-space: pre-wrap;
      font-size: 14px;
    }

    img.preview {
      margin-top: 12px;
      max-width: 100%;
      max-height: 280px;
      border: 1px solid #ddd;
      border-radius: 8px;
      display: none;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      startup: {
        typeset: false
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  
  <div class="header-container">
    <h1>Qwen Mobile Demo</h1>
    <select id="streamMode">
      <option value="false">非流式输出</option>
      <option value="true" selected>流式打字机输出</option>
    </select>
  </div>

  <div class="desc">
    这是一个基于 vLLM + FastAPI 的本地多模态推理演示页面。
  </div>

  <div class="card">
    <h2>1. 文本输入</h2>
    <textarea id="textPrompt" placeholder="请输入你的问题"></textarea>
    <button id="textBtn" onclick="handleSendText()">发送文本请求</button>
    <div id="textOutput" class="output">等待输入...</div>
  </div>

  <div class="card">
    <h2>2. 文件输入</h2>
    <input type="file" id="fileInput" accept=".txt,.md,.json,.csv">
    <textarea id="fileQuestion" placeholder="请输入你想对文件提的问题">请总结这份文件的内容</textarea>
    <div id="fileMeta" class="meta">当前未选择文件。</div>
    <button id="fileBtn" onclick="handleSendFile()">发送文件请求</button>
    <div id="fileOutput" class="output">等待输入...</div>
  </div>

  <div class="card">
    <h2>3. 图片输入</h2>
    <textarea id="imagePrompt" placeholder="请输入你想让模型分析图片的要求">请描述这张图片的主要内容，并尽量简洁清楚。</textarea>
    <input type="file" id="imageInput" accept="image/*" capture="environment">
    <img id="imagePreview" class="preview" />
    <div id="imageMeta" class="meta">当前未选择图片。</div>
    <button id="imageBtn" onclick="handleSendImage()">发送图片请求</button>
    <div id="imageOutput" class="output">等待输入...</div>
  </div>

  <script>
    let selectedTextFile = null;
    let selectedTextFileContent = "";
    let selectedImageFile = null;
    let selectedImageBase64 = "";

    async function readTextFile(file) {
      return await file.text();
    }

    async function compressImage(file, maxSide = 768, quality = 0.75) {
      const img = document.createElement("img");
      const reader = new FileReader();

      const dataUrl = await new Promise((resolve, reject) => {
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      img.src = dataUrl;

      await new Promise((resolve) => {
        img.onload = resolve;
      });

      let { width, height } = img;
      const scale = Math.min(maxSide / Math.max(width, height), 1);
      width = Math.round(width * scale);
      height = Math.round(height * scale);

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);

      return canvas.toDataURL("image/jpeg", quality);
    }

    // 核心重构：将文本、文件、图片的请求收拢到这一个核心函数中
    async function fetchAndRender(url, payload, btn, outputElement) {
      btn.disabled = true;
      outputElement.textContent = "请求中...";
      
      // 读取右上角的下拉框状态
      const isStream = document.getElementById("streamMode").value === "true";
      payload.stream = isStream;

      try {
        const resp = await fetch(url, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload)
        });

        if (!resp.ok) {
          throw new Error(`请求报错，状态码: ${resp.status}`);
        }

        if (isStream) {
          // ====== 流式渲染逻辑 ======
          const reader = resp.body.getReader();
          const decoder = new TextDecoder("utf-8");
          let fullText = "";
          
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            
            // 逐步累加解码后的字符串并实时更新 DOM
            fullText += decoder.decode(value, { stream: true });
            outputElement.innerHTML = marked.parse(fullText);
          }
          // 等全部流接收完毕后，再统一渲染数学公式（避免公式被截断渲染导致崩溃）
          if (window.MathJax) {
            MathJax.typesetPromise([outputElement]);
          }
        } else {
          // ====== 非流式渲染逻辑 ======
          const data = await resp.json();
          if (data.answer) {
            outputElement.innerHTML = marked.parse(data.answer);
            if (window.MathJax) {
              MathJax.typesetPromise([outputElement]);
            }
          } else {
            outputElement.textContent = JSON.stringify(data, null, 2);
          }
        }
      } catch (err) {
        outputElement.textContent = "请求失败：\n" + err.message;
      } finally {
        btn.disabled = false;
      }
    }

    async function handleSendText() {
      const btn = document.getElementById("textBtn");
      const output = document.getElementById("textOutput");
      const prompt = document.getElementById("textPrompt").value.trim();

      if (!prompt) {
        output.textContent = "请输入问题。";
        return;
      }

      await fetchAndRender("/api/chat/text", { prompt }, btn, output);
    }

    async function handleSendFile() {
      const btn = document.getElementById("fileBtn");
      const output = document.getElementById("fileOutput");
      const question = document.getElementById("fileQuestion").value.trim();

      if (!selectedTextFile) {
        output.textContent = "请先选择 txt / md / json / csv 文件。";
        return;
      }

      await fetchAndRender("/api/chat/file", {
        file_name: selectedTextFile.name,
        file_content: selectedTextFileContent,
        question: question || "请总结这份文件的内容"
      }, btn, output);
    }

    async function handleSendImage() {
      const btn = document.getElementById("imageBtn");
      const output = document.getElementById("imageOutput");
      const prompt = document.getElementById("imagePrompt").value.trim();

      if (!selectedImageBase64) {
        output.textContent = "请先选择或拍摄一张图片。";
        return;
      }

      await fetchAndRender("/api/chat/image", {
        prompt: prompt || "请描述这张图片的主要内容，并尽量简洁清楚。",
        image_base64: selectedImageBase64
      }, btn, output);
    }

    document.getElementById("fileInput").addEventListener("change", async function () {
      const file = this.files[0];
      const meta = document.getElementById("fileMeta");
      selectedTextFile = null;
      selectedTextFileContent = "";

      if (!file) {
        meta.textContent = "当前未选择文件。";
        return;
      }

      try {
        const content = await readTextFile(file);
        selectedTextFile = file;
        selectedTextFileContent = content;

        const preview = content.length > 300 ? content.slice(0, 300) + "\n...(已截断)" : content;

        meta.textContent =
          "已选择文件：" + file.name + "\n" +
          "文件大小：" + (file.size / 1024).toFixed(1) + " KB\n" +
          "文本长度：" + content.length + " 字符\n\n" +
          "内容预览：\n" + preview;
      } catch (err) {
        meta.textContent = "文件读取失败：\n" + err;
      }
    });

    document.getElementById("imageInput").addEventListener("change", async function () {
      const file = this.files[0];
      const meta = document.getElementById("imageMeta");
      const preview = document.getElementById("imagePreview");
      selectedImageFile = null;
      selectedImageBase64 = "";

      if (!file) {
        meta.textContent = "当前未选择图片。";
        preview.style.display = "none";
        return;
      }

      try {
        const compressed = await compressImage(file, 768, 0.75);
        selectedImageFile = file;
        selectedImageBase64 = compressed;

        preview.src = compressed;
        preview.style.display = "block";

        meta.textContent =
          "已选择图片：" + file.name + "\n" +
          "原始大小：" + (file.size / 1024).toFixed(1) + " KB\n" +
          "已完成浏览器端压缩，将以 base64 发送到后端。";
      } catch (err) {
        meta.textContent = "图片处理失败：\n" + err;
        preview.style.display = "none";
      }
    });
  </script>
</body>
</html>
